name: Release

on:
  push:
    branches:
      - master

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          # GITHUB_TOKEN だと PR の作成・更新がワークフローを起動できず、
          # 必須チェックが Waiting のままになるため、fine-grained PAT を使う
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      id-token: write # trusted publishing の OIDC トークン発行に必要
      contents: read
    steps:
      - uses: actions/checkout@v7

      # trusted publishing には npm 11.5.1 以上が必要。Node 24 同梱の npm (11.x) で足りる
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # publish はビルドを自動では行わない（ignore-scripts=true のため publish 時のフックは動かない）
      - name: Build
        run: npm run build

      # 空パッケージの公開を防ぐ。ビルド成果物がなければここで止まる
      - name: Check build output
        run: test -f esm/index.js && test -f esm/index.d.ts

      # 認証は OIDC（トークン設定なし）
      - name: Publish to npm
        run: npm publish
