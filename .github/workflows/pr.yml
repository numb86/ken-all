name: Unit test, Lint, and Type check

on:
  pull_request:
    branches:
      - master
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - name: Library install
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Unit test
        run: npm run test

      - name: E2E test
        run: make e2e-test

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Verify CSV generation
        run: |
          cd generateCsv
          cargo run --release
          cd ..
          git diff --exit-code postalCode/csv/ || (echo "❌ Generated CSV differs from committed postalCode/csv/" && exit 1)
          echo "✅ Generated CSV matches committed postalCode/csv/"
